name: Build and Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
      runs-on: ubuntu-latest
      defaults:
        run: 
          working-directory: DataHarbor.WebAPI
          
      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Setup .NET
          uses: actions/setup-dotnet@v3
          with:
            dotnet-version: '8.0.x'
    
        - name: Restore Dependencies
          run: dotnet restore DataHarbor.Common/DataHarbor.Common.csproj

        - name : Build Assemblies
          run: dotnet build --no-restore DataHarbor.Common/DataHarbor.Common.csproj --configuration Release
        
        - name: Create Nuget Package
          run: dotnet pack DataHarbor.Common/DataHarbor.Common.csproj --configuration Release --no-build --output nupkg
        
        - name: Publish Nuget Package
          run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
          env:
            NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

        - name: Log in to Docker Hub
          uses: docker/login-action@f054a8b539a109f9f41c372932f1ae047eff08c9
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}
          
        - name: Build the Docker image
          run: docker build . --file Dockerfile --tag ${{ secrets.DOCKER_USERNAME }}/dataharbor-webapi

        - name: Docker Push
          run: docker push ${{ secrets.DOCKER_USERNAME }}/dataharbor-webapi
