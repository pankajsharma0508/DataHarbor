<div class="p-2">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <div class="d-flex gap-3">
            <i class="fa fa-2x fas fa-file-contract"></i>
            <h4 class="mb-0">Declaration From {{ declaration.name }}</h4>
        </div>
        <div class="p-2 mt-4">
            <button class="btn btn-primary" (click)="saveDeclaration()">
                <i class="fa fas fa-save"></i>
                Save
            </button>
        </div>
    </div>
    <div class="mb-4 d-flex">
        {{ declaration.recieveDate | date:'medium' }}
    </div>
    <app-tabs [tabs]="tabs" [(selectedTab)]="selectedTab"></app-tabs>
</div>
@if(declaration) {
<div class="p-2">
    <div [hidden]="selectedTab.name != tabNames.SourceData">
        <dx-data-grid [dataSource]="rawData" [showBorders]="true" [rowAlternationEnabled]="true" [showRowLines]="true"
            [showColumnLines]="true">
            <dxo-editing mode="row" [useIcons]="true" [allowUpdating]="true" [allowDeleting]="true"
                [allowAdding]="true">
            </dxo-editing>
        </dx-data-grid>
    </div>
    <div [hidden]="selectedTab.name != tabNames.OperatorData">
        <dx-data-grid [dataSource]="transactions" [showBorders]="true" [rowAlternationEnabled]="true"
            [showRowLines]="true" [showColumnLines]="true">
            <dxo-editing mode="row" [useIcons]="true" [allowUpdating]="true" [allowDeleting]="true"
                [allowAdding]="true">
            </dxo-editing>
        </dx-data-grid>
    </div>
</div>
}
